@if (images.length > 0) {
  <div class="grid">
    @for (image of images; track image.id) {
      <app-image-card [image]="image" (open)="selectedImageId.set(image.id)"></app-image-card>
    }
  </div>
} @else {
  <p class="empty">{{ emptyMessage }}</p>
}

@if (selectedImageId()) {
  <app-image-viewer-modal [imageId]="selectedImageId()!" (close)="selectedImageId.set(null)"></app-image-viewer-modal>
}
