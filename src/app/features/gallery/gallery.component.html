<div class="gallery-header">
  <h1>Últimas imagens enviadas</h1>

  <div class="debug-bar">
    <button class="btn btn-ghost debug-btn" (click)="debugLogEnv()">
      🔍 Log environment no console
    </button>

    <button class="btn btn-ghost debug-btn" (click)="debugShowUrl()">
      🌐 Mostrar URL da API
    </button>

    <button class="btn btn-ghost debug-btn" (click)="debugTestApi()">
      📡 Testar comunicação com a API
    </button>
  </div>

  @if (debugApiUrl()) {
    <p class="debug-result">🌐 API URL: <code>{{ debugApiUrl() }}</code></p>
  }
  @if (debugTestResult()) {
    <p class="debug-result">{{ debugTestResult() }}</p>
  }
</div>

@if (loading()) {
  <p class="loading-text">Carregando imagens...</p>
} @else {
  <app-image-grid [images]="images()" emptyMessage="Nenhuma imagem aprovada por aqui ainda."></app-image-grid>

  @if (totalPages > 1) {
    <div class="pagination">
      @for (p of pageNumbers(); track p) {
        <button
          class="page-btn"
          [class.active]="page() === p"
          (click)="goToPage(p)">
          {{ p }}
        </button>
      }
    </div>
  }
}
