    <span class="label">Usuários aguardando aprovação</span>
  </a>

  <a routerLink="/admin/uploads" class="summary-card">
    <span class="number">{{ pendingImages() }}</span>

  <a routerLink="/admin/sugestoes" class="summary-card">
